uart:
  id: uart_bus
  # tx_pin: GPIO21
  # rx_pin: GPIO20
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 256000

i2c:
  id: i2c_bus
  # sda: GPIO5
  # scl: GPIO6
  sda: GPIO0
  scl: GPIO1
  scan: true

output:
  - platform: ledc
    id: mlt8530_buzzer
    # pin: GPIO7
    pin: GPIO8
    frequency: 2700 Hz
    inverted: false

bme68x_bsec2_i2c:
  i2c_id: i2c_bus
  id: bsec_virtual_sensor
  address: 0x76
  model: bme688
  sample_rate: LP
  supply_voltage: 3.3V
  state_save_interval: 6h
  operating_age: 4d 

globals:
  - id: flip_y_state
    type: bool
    restore_value: true
    initial_value: 'false'
    
  - id: onboarding_done
    type: bool
    restore_value: true
    initial_value: 'false'

zigbee:
  id: "zb"
  endpoints:
    - num: 1
      device_type: SIMPLE_SENSOR
      clusters:
      - id: OCCUPANCY_SENSING
        attributes:
        - attribute_id: 0x0 # https://github.com/espressif/esp-zigbee-sdk/blob/929038a/components/esp-zigbee-lib/include/zcl/esp_zigbee_zcl_occupancy_sensing.h
          id: z_any_presence
          type: u8 # map8
          device: any_presence
          report: true
          value: 0 # 0 = Unoccupied, 1 = Occupied
          lambda: |-
            return x ? 1 : 0;
        - attribute_id: 0x1 # https://github.com/espressif/esp-zigbee-sdk/blob/929038a/components/esp-zigbee-lib/include/zcl/esp_zigbee_zcl_occupancy_sensing.h
          id: z_any_presence_type
          type: u8 # enum8
          value: 0x01 # 0x00 = PIR, 0x01 = Ultrasonic, 0x02 = PIR and Ultrasonic
    - num: 2
      device_type: SIMPLE_SENSOR
      clusters:
      - id: TEMP_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # https://github.com/espressif/esp-zigbee-sdk/blob/929038a/components/esp-zigbee-lib/include/zcl/esp_zigbee_zcl_temperature_meas.h
          id: z_bme_temp_corr
          type: 16bit
          device: bme_temp_corr
          report: true
          value: 0
          scale: 100
      - id: REL_HUMIDITY_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # https://github.com/espressif/esp-zigbee-sdk/blob/929038a/components/esp-zigbee-lib/include/zcl/esp_zigbee_zcl_humidity_meas.h
          id: z_bme_rh_corr
          type: 16bit
          device: bme_rh_corr
          report: true
          value: 0
          scale: 100
      - id: PRESSURE_MEASUREMENT
        attributes:
        - attribute_id: 0x0 #
          id: z_bme_pressure
          type: 16bit
          device: bme_pressure
          report: true
          value: 0
          scale: 100
      - id: CARBON_DIOXIDE_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # 
          id: z_bme_co2_equivalent
          type: u16
          device: bme_co2_equivalent
          report: true
          value: 0
          scale: 100
      - id: BASIC # VOC_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # 
          id: z_bme_voc_equivalent
          type: u16
          device: bme_voc_equivalent
          report: true
          value: 0
          scale: 100
    - num: 3
      device_type: SIMPLE_SENSOR
      clusters:
      - id: TEMP_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # https://github.com/espressif/esp-zigbee-sdk/blob/929038a/components/esp-zigbee-lib/include/zcl/esp_zigbee_zcl_temperature_meas.h
          id: z_scd40_temp_corr
          type: 16bit
          device: scd40_temp_corr
          report: true
          value: 0
          scale: 100
      - id: REL_HUMIDITY_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # https://github.com/espressif/esp-zigbee-sdk/blob/929038a/components/esp-zigbee-lib/include/zcl/esp_zigbee_zcl_humidity_meas.h
          id: z_scd40_rh_corr
          type: 16bit
          device: scd40_rh_corr
          report: true
          value: 0
          scale: 100
      - id: CARBON_DIOXIDE_MEASUREMENT
        attributes:
        - attribute_id: 0x0 # 
          id: z_scd_co2
          type: u16
          device: scd_co2
          report: true
          value: 0
          scale: 100
    - num: 4
      device_type: SIMPLE_SENSOR
      clusters:
      - id: ILLUMINANCE_MEASUREMENT
        attributes:
        - attribute_id: 0x0 #
          id: z_ltr390_ambient_light
          type: 16bit
          device: ltr390_ambient_light
          report: true
          value: 0
          scale: 100
      - id: BASIC # UV_ILLUMINANCE_MEASUREMENT
        attributes:
        - attribute_id: 0x0 #
          id: z_ltr390_uv_index
          type: 16bit
          device: ltr390_uv_index
          report: true
          value: 0
          scale: 100
  on_join:
    then:
    - logger.log: "Joined network"
    - if:
        condition:
          lambda: 'return !id(onboarding_done);'
        then:
          - script.execute: finish_onboarding
          
light:
  - platform: esp32_rmt_led_strip
    name: "WS2812 | LED"
    entity_category: config
    id: ws2812_LED
    chipset: WS2812
    pin: GPIO3
    num_leds: 1
    rgb_order: GRB
    effects:
      - addressable_lambda:
          name: "Purple Breathing"
          update_interval: 50ms
          lambda: |-
            static float phase = 0.0f;
            phase += 0.02f;
            if (phase > 1.0f) phase -= 1.0f;
            float s = (sinf(phase * 2.0f * 3.14159f) + 1.0f) * 0.5f;
            float brightness = s * 0.85f + 0.15f;
            uint8_t r = (uint8_t)(brightness * 220.0f);
            uint8_t g = 0;
            uint8_t b = (uint8_t)(brightness * 255.0f);
            for (size_t i = 0; i < it.size(); i++) {
              it[i] = Color(r, g, b);
            }

binary_sensor:
#   - platform: status
#     name: "ESP32 | Status"
#     entity_category: diagnostic

  - platform: template
    name: "Any Presence"
    id: any_presence
    icon: mdi:home-account
    device_class: presence
    lambda: |-
      static unsigned long last_off = 0;
      bool present = id(target1_distance).state > 0 ||
                     id(target2_distance).state > 0 ||
                     id(target3_distance).state > 0;
      unsigned long now = millis();
      if (present) {
        last_off = now;
        return true;
      }
      return (now - last_off) < (unsigned long)(id(presence_delay).state * 1000.0);

switch:
  - platform: template
    id: flip_y
    optimistic: true
    internal: true

number:
  - platform: template
    name: "Any Presence Delay"
    icon: mdi:timer-outline
    id: presence_delay
    unit_of_measurement: "s"
    min_value: 0
    max_value: 3600
    step: 1
    initial_value: 0
    optimistic: true
    restore_value: true
    mode: box

  - platform: template
    name: "Detection Range"
    icon: mdi:signal-distance-variant
    id: detection_range
    unit_of_measurement: "cm"
    min_value: 0
    max_value: 600
    step: 1
    initial_value: 600
    optimistic: true
    restore_value: true
    mode: box

  - platform: template
    id: ltr390_lux_offset
    name: "LTR390 Lux Offset"
    icon: mdi:brightness-5
    unit_of_measurement: "lux"
    min_value: -10000
    max_value: 10000
    step: 0.1
    initial_value: 0
    optimistic: true
    restore_value: true
    mode: box

  - platform: template
    id: ltr390_uv_offset
    name: "LTR390 UV Offset"
    icon: mdi:weather-sunset
    unit_of_measurement: "index"
    min_value: -50
    max_value: 50
    step: 0.1
    initial_value: 0
    optimistic: true
    restore_value: true
    mode: box

  - platform: template
