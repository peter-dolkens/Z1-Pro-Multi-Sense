esphome:
  name: "z1-pro-multi-sense"
  friendly_name: "Z1 Pro Multi Sense"
  name_add_mac_suffix: true
  project:
    name: "Sensy-One.Z1 Pro Multi Sense"
    version: "v1.1.7"
  on_boot:
    priority: 600
    then:
      - if:
          condition:
            lambda: 'return !id(onboarding_done);'
          then:
            - light.turn_on:
                id: ws2812_LED
                effect: "Purple Breathing"   

script:
  - id: finish_onboarding
    mode: restart
    then:
      - light.turn_on:
          id: ws2812_LED
          red: 100%
          green: 0%
          blue: 30% 
          brightness: 100%
      - delay: 2s
      - light.turn_off: ws2812_LED
      - lambda: 'id(onboarding_done) = true;'

external_components:
  - source:
      type: local
      path: components
  - source: github://luar123/zigbee_esphome
    components: [zigbee]

esp32:
  partitions: partitions_zb.csv
  board: esp32-c6-devkitm-1
  framework:
    type: esp-idf
    # version: 5.4.2
    # platform_version: 54.03.21
    sdkconfig_options:
      CONFIG_BOOTLOADER_APP_ROLLBACK_ENABLE: n

