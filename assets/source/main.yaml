    name: SCD40 Temperature Offset
    icon: mdi:thermometer
    unit_of_measurement: "°C"
    min_value: -50
    max_value: 50
    step: 0.1
    initial_value: 14.5
    optimistic: true
    restore_value: true
    mode: box

  - platform: template
    id: bme688_temperature_offset
    name: BME688 Temperature Offset
    icon: mdi:thermometer
    unit_of_measurement: "°C"
    min_value: -50
    max_value: 50
    step: 0.1
    initial_value: 14.5
    optimistic: true
