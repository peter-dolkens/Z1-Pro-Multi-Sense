    target3_y:
      name: "Target 3 Y"
      id: target3_y
      icon: mdi:alpha-y-box-outline
      unit_of_measurement: "cm"
    target3_angle:
      name: "Target 3 Angle"
      id: target3_angle
      icon: mdi:format-text-rotation-angle-up
      unit_of_measurement: "°"
    target3_speed:
      name: "Target 3 Speed"
      id: target3_speed
      icon: mdi:speedometer
      unit_of_measurement: "cm/s"
    target3_distance:
      name: "Target 3 Distance"
      id: target3_distance
      icon: mdi:map-marker-distance
      unit_of_measurement: "cm"

    flip_y: flip_y
    detection_range: detection_range


    tracking_mode:
      name: "RADAR | Tracking Mode"
      id: radar_tracking_mode
      entity_category: diagnostic
      icon: mdi:radar

    bluetooth_state:
     name: "RADAR | Bluetooth"
     id: radar_bluetooth_state
     entity_category: diagnostic
     icon: mdi:bluetooth

  - platform: scd4x
    id: scd40_sensor
    measurement_mode: periodic
    automatic_self_calibration: false
    ambient_pressure_compensation_source: bme_pressure
    update_interval: 5s            
    co2:
      name: "SCD40 CO₂ Concentration"
      id: scd_co2
      unit_of_measurement: "ppm"
      icon: "mdi:molecule-co2"
    temperature:
      name: "SCD40 Temperature Raw"
      id: scd40_temp_raw
      unit_of_measurement: "°C"
      icon: "mdi:thermometer"
      internal: true
    humidity:
      name: "SCD40 Humidity Raw"
      id: scd40_rh_raw
      unit_of_measurement: "%"
      icon: "mdi:water-percent"
      internal: true

  - platform: template
    id: scd40_temp_corr
    name: "SCD40 Temperature"
    unit_of_measurement: "°C"
    state_class: measurement
    device_class: temperature
    accuracy_decimals: 2
    update_interval: 5s
    lambda: |-
      if (isnan(id(scd40_temp_raw).state)) return NAN;
      return id(scd40_temp_raw).state - id(scd40_temperature_offset).state;

  - platform: template
    id: scd40_rh_corr
    name: "SCD40 Humidity"
    unit_of_measurement: "%"
    state_class: measurement
    device_class: humidity
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      const float Tm  = id(scd40_temp_raw).state;
      const float Tc  = id(scd40_temp_corr).state;
      const float RHm = id(scd40_rh_raw).state;
      if (isnan(Tm) || isnan(Tc) || isnan(RHm)) return NAN;

      auto es = [](float T) -> float {
        return 6.1094f * expf(17.625f * T / (T + 243.04f));
      };
      float e = (RHm / 100.0f) * es(Tm);
      float RHc = 100.0f * e / es(Tc);
      if (RHc < 0.0f) RHc = 0.0f;
      if (RHc > 100.0f) RHc = 100.0f;
      return RHc;

  - platform: bme68x_bsec2
    temperature:
      name: "BME688 Temperature Raw"
      id: bme_temp_raw
      internal: true
      sample_rate: LP
    pressure:
      name: "BME688 Pressure"
      id: bme_pressure
      sample_rate: LP
    humidity:
      name: "BME688 Humidity Raw"
      id: bme_rh_raw
      internal: true
      sample_rate: LP
    gas_resistance:
      name: "BME688 Gas Resistance (kΩ)"
      unit_of_measurement: "kΩ"
      accuracy_decimals: 1
      icon: mdi:omega
      filters:
        - multiply: 0.001
    iaq:
      name: "BME688 IAQ"
      id: iaq
    co2_equivalent:
      name: "BME688 CO₂ Equivalent"
      id: bme_co2_equivalent
    breath_voc_equivalent:
      id: bme_voc_equivalent
      name: "BME688 VOC Equivalent"

  - platform: template
    id: bme_temp_corr
    name: "BME688 Temperature"
    unit_of_measurement: "°C"
    state_class: measurement
    device_class: temperature
    accuracy_decimals: 2
    update_interval: 5s
    lambda: |-
      if (isnan(id(bme_temp_raw).state)) return NAN;
      return id(bme_temp_raw).state - id(bme688_temperature_offset).state;

  - platform: template
    id: bme_rh_corr
    name: "BME688 Humidity"
    unit_of_measurement: "%"
    state_class: measurement
    device_class: humidity
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      const float Tm  = id(bme_temp_raw).state;
      const float Tc  = id(bme_temp_corr).state;
      const float RHm = id(bme_rh_raw).state;
      if (isnan(Tm) || isnan(Tc) || isnan(RHm)) return NAN;

      auto es = [](float T) -> float {
        return 6.1094f * expf(17.625f * T / (T + 243.04f));
      };
      float e = (RHm / 100.0f) * es(Tm);
      float RHc = 100.0f * e / es(Tc);
      if (RHc < 0.0f) RHc = 0.0f;
      if (RHc > 100.0f) RHc = 100.0f;
      return RHc;

  - platform: ltr390
    i2c_id: i2c_bus
    update_interval: 1s
    light:
      id: ltr390_ambient_light
      name: "LTR390 Ambient Light (lux)"
      icon: mdi:brightness-5
      filters:
        - lambda: |-
            return (x - id(ltr390_lux_offset).state) * 5.0;
    uv_index:
      id: ltr390_uv_index
      name: "LTR390 UV Index"
      icon: mdi:weather-sunset
      filters:
        - lambda: |-
            return (x - id(ltr390_uv_offset).state) * 2.5; 
    gain:
      ambient_light: X1
      uv: X18
    resolution:
      ambient_light: 20
      uv: 20
      